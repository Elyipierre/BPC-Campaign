<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | BPC Campaign</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="assets/app-config.js"></script>
    <style>
        body { background: #0f172a; color: white; font-family: 'Inter', sans-serif; margin: 0; min-height: 100vh;}
        .glass-panel { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.08); }
        select { background: #1e293b; color: white; border: 1px solid rgba(255, 255, 255, 0.1); padding: 8px; border-radius: 8px; outline: none; font-size: 13px; font-weight: 600;}
        .toggle-checkbox:checked { right: 0; border-color: #14b8a6; }
        .toggle-checkbox:checked + .toggle-label { background-color: #14b8a6; }
    </style>
</head>
<body class="p-10 max-w-6xl mx-auto">
    <header class="flex justify-between items-center mb-10 border-b border-white/10 pb-6">
        <div>
            <h1 class="text-3xl font-bold tracking-tight">Admin Command Center</h1>
            <p class="text-slate-400 mt-2">Manage the publisher pool and territory states.</p>
        </div>
        <div class="flex gap-4">
            <button onclick="window.location.href='Territory Management.html'" class="px-6 py-2 bg-slate-800 hover:bg-slate-700 rounded-xl font-bold text-sm transition-colors">Back to Map</button>
            <button onclick="window.appConfig.signOut()" class="px-6 py-2 bg-red-500/20 text-red-400 hover:bg-red-500/30 rounded-xl font-bold text-sm transition-colors">Sign Out</button>
        </div>
    </header>

    <div class="glass-panel rounded-2xl overflow-hidden">
        <table class="w-full text-left">
            <thead class="bg-black/20">
                <tr>
                    <th class="p-5 text-xs font-bold text-slate-400 uppercase tracking-widest border-b border-white/5">Territory</th>
                    <th class="p-5 text-xs font-bold text-slate-400 uppercase tracking-widest border-b border-white/5">State</th>
                    <th class="p-5 text-xs font-bold text-slate-400 uppercase tracking-widest border-b border-white/5">Publisher Pool</th>
                </tr>
            </thead>
            <tbody id="admin-table-body" class="divide-y divide-white/5">
                <tr><td colspan="3" class="p-8 text-center text-slate-500">Loading database...</td></tr>
            </tbody>
        </table>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const { data: { session } } = await window.appConfig.supabase.auth.getSession();
            if (!session) return window.location.replace('index.html');
            
            const { data, error } = await window.appConfig.supabase.from('territories').select('*').order('id');
            if (data) {
                document.getElementById('admin-table-body').innerHTML = data.map(t => `
                    <tr class="hover:bg-white/[0.02]">
                        <td class="p-5 font-bold">${t.id}</td>
                        <td class="p-5">
                            <select onchange="updateState('${t.id}', this.value)">
                                <option value="" ${!t.territory_state ? 'selected' : ''}>None</option>
                                <option value="Initial Call" ${t.territory_state === 'Initial Call' ? 'selected' : ''}>Initial Call</option>
                                <option value="2nd Call" ${t.territory_state === '2nd Call' ? 'selected' : ''}>2nd Call</option>
                                <option value="Letter Writing" ${t.territory_state === 'Letter Writing' ? 'selected' : ''}>Letter Writing</option>
                            </select>
                        </td>
                        <td class="p-5 flex items-center gap-3">
                            <div class="relative inline-block w-12 align-middle select-none">
                                <input type="checkbox" id="toggle-${t.id}" class="toggle-checkbox absolute block w-6 h-6 rounded-full bg-white border-4 appearance-none cursor-pointer transition-all duration-300 z-10" ${t.is_enabled ? 'checked' : ''} onchange="togglePool('${t.id}', this.checked)"/>
                                <label for="toggle-${t.id}" class="toggle-label block overflow-hidden h-6 rounded-full bg-slate-700 cursor-pointer transition-colors duration-300"></label>
                            </div>
                            <span class="text-xs font-bold ${t.is_enabled ? 'text-teal-400' : 'text-slate-500'}" id="lbl-${t.id}">${t.is_enabled ? 'ENABLED' : 'HIDDEN'}</span>
                        </td>
                    </tr>
                `).join('');
            }
        });

        async function updateState(id, val) {
            await window.appConfig.supabase.from('territories').update({ territory_state: val || null }).eq('id', id);
        }

        async function togglePool(id, isEnabled) {
            await window.appConfig.supabase.from('territories').update({ is_enabled: isEnabled }).eq('id', id);
            const lbl = document.getElementById(`lbl-${id}`);
            lbl.innerText = isEnabled ? 'ENABLED' : 'HIDDEN';
            lbl.className = `text-xs font-bold ${isEnabled ? 'text-teal-400' : 'text-slate-500'}`;
        }
    </script>
</body>
</html>

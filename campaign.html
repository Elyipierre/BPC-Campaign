<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Territory Management - Campaigns</title>
  <meta http-equiv="refresh" content="0; url=./campaign.html">
  <style>
    :root {
      color-scheme: light;
      --bg: #eef2ef;
      --card: #ffffff;
      --ink: #15233a;
      --muted: #5b6a7f;
      --accent: #1f7a67;
      --border: rgba(21, 35, 58, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        radial-gradient(circle at top left, rgba(31, 122, 103, 0.12), transparent 34%),
        linear-gradient(180deg, #f4f6f5 0%, var(--bg) 100%);
      color: var(--ink);
      font: 500 16px/1.5 "IBM Plex Sans", "Segoe UI", sans-serif;
    }

    main {
      width: min(100%, 520px);
      padding: 28px 28px 24px;
      border-radius: 24px;
      border: 1px solid var(--border);
      background: color-mix(in srgb, var(--card) 94%, transparent);
      box-shadow: 0 18px 48px rgba(21, 35, 58, 0.12);
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(2rem, 5vw, 2.75rem);
      line-height: 1.05;
    }

    h1 span {
      color: var(--accent);
    }

    p {
      margin: 0;
      color: var(--muted);
    }

    a {
      color: var(--accent);
      font-weight: 600;
    }
  </style>
</head>
<body>
  <main>
    <h1>Territory Management <span>Campaigns</span></h1>
    <p>Opening the campaign app. If it does not load automatically, <a href="./campaign.html">open it here</a>. The manager remains available at <a href="./Territory%20Management.html">Territory Management.html</a>.</p>
  </main>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>BPC Campaign - Login</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/app-config.js"></script>
  
  <style>
    :root {
      color-scheme: light;
      --bg: #eef2ef;
      --card: #ffffff;
      --ink: #15233a;
      --border: rgba(21, 35, 58, 0.12);
    }
    
    * { box-sizing: border-box; }
    
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background: radial-gradient(circle at top left, rgba(31, 122, 103, 0.08), transparent 40%), linear-gradient(180deg, #f4f6f5 0%, var(--bg) 100%);
      color: var(--ink);
      font: 500 16px/1.5 'Inter', sans-serif;
    }

    main {
      width: min(100%, 380px); /* Slightly narrower for a more focused card */
      padding: 48px 32px;
      border-radius: 28px;
      border: 1px solid var(--border);
      background: color-mix(in srgb, var(--card) 98%, transparent);
      box-shadow: 0 20px 40px rgba(21, 35, 58, 0.06);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 48px; /* Perfect breathing room between logo and button */
    }

    .logo-container {
      width: 160px;
      height: 160px;
      background: rgba(31, 122, 103, 0.03);
      border-radius: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(31, 122, 103, 0.1);
      box-shadow: inset 0 4px 20px rgba(255, 255, 255, 0.6), 0 10px 24px rgba(31, 122, 103, 0.06);
      padding: 20px;
    }

    .logo-container img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      /* Adds a tiny drop shadow to your actual logo image to make it pop */
      filter: drop-shadow(0 4px 6px rgba(0,0,0,0.05)); 
    }

    .btn {
      background: #ffffff;
      color: #3c4043; /* Standard Google Text Color */
      border: 1px solid #dadce0;
      padding: 12px 24px;
      border-radius: 12px;
      font-weight: 600;
      font-size: 15px;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
      transition: all 0.2s ease;
    }

    .btn:hover { 
      transform: translateY(-1px); 
      box-shadow: 0 6px 16px rgba(0, 0, 0, 0.08); 
      background: #f8f9fa;
    }

    .btn:active { 
      transform: translateY(1px); 
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.04);
    }
  </style>
</head>
<body>
  <main>
    <div class="logo-container">
      <img src="assets/logo.png" alt="BPC Campaign Logo">
    </div>
    
    <button class="btn" onclick="window.appConfig.signInWithGoogle()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      Sign in with Google
    </button>
  </main>
  
  <script>
    // Protect route: Skip login if already authenticated
    window.onload = async () => {
      if (window.appConfig && window.appConfig.supabase) {
          const { data: { session } } = await window.appConfig.supabase.auth.getSession();
          if (session) window.location.href = 'territory-management.html';
      }
    };
  </script>
</body>
</html>

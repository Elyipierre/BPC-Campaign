<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Territory Assistant - Secure Access</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/app-config.js"></script>

  <style>
    * { box-sizing: border-box; }

    :root {
      --bg: #0f172a;
      --grid-line: rgba(148, 163, 184, 0.06);
      --territory-stroke: rgba(153, 246, 228, 0.62);
      --territory-fill: rgba(20, 184, 166, 0.08);
      --territory-shadow: rgba(20, 184, 166, 0.18);
    }

    html, body {
      width: 100%;
      height: 100%;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      color: white;
      font-family: 'Inter', sans-serif;
      background:
        radial-gradient(circle at 50% 42%, rgba(20, 184, 166, 0.17) 0%, rgba(20, 184, 166, 0.09) 16%, rgba(15, 23, 42, 0) 42%),
        radial-gradient(circle at 50% 50%, rgba(14, 165, 233, 0.06) 0%, transparent 46%),
        linear-gradient(180deg, #071332 0%, #081536 32%, #08142f 68%, #06112a 100%);
      isolation: isolate;
    }

    @keyframes float {
      0% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
      100% { transform: translateY(0); }
    }

    @keyframes territoryFade {
      0%, 100% {
        opacity: 0;
      }
      18% {
        opacity: 0.08;
      }
      45% {
        opacity: 0.9;
      }
      70% {
        opacity: 0.16;
      }
    }

    @keyframes glowPulse {
      0%, 100% {
        opacity: 0.65;
        transform: translate(-50%, -50%) scale(1);
      }
      50% {
        opacity: 0.95;
        transform: translate(-50%, -50%) scale(1.05);
      }
    }

    .scene {
      position: absolute;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      overflow: hidden;
    }

    .scene::before,
    .scene::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .scene::before {
      background-image:
        linear-gradient(var(--grid-line) 1px, transparent 1px),
        linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
      background-size: 72px 72px;
      opacity: 0.28;
      mask-image: radial-gradient(circle at center, black 24%, rgba(0,0,0,0.7) 48%, transparent 84%);
      -webkit-mask-image: radial-gradient(circle at center, black 24%, rgba(0,0,0,0.7) 48%, transparent 84%);
      transform: perspective(900px) rotateX(68deg) scale(1.5);
      transform-origin: center center;
    }

    .scene::after {
      background:
        radial-gradient(circle at center, rgba(20,184,166,0.12) 0%, rgba(20,184,166,0.05) 22%, transparent 48%);
      filter: blur(34px);
      opacity: 0.8;
    }

    .territory-overlay {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 2;
      pointer-events: none;
      overflow: visible;
    }

    .glow-orb {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 420px;
      height: 420px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(20,184,166,0.22) 0%, rgba(20,184,166,0.1) 32%, rgba(20,184,166,0) 70%);
      filter: blur(80px);
      z-index: 3;
      pointer-events: none;
      animation: glowPulse 9s ease-in-out infinite;
    }

    main {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 70px;
      padding: 40px 32px;
    }

    .logo-wrapper {
      width: 280px;
      height: 280px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      animation: float 6s ease-in-out infinite;
    }

    .logo-wrapper img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      filter: drop-shadow(0 24px 32px rgba(0, 0, 0, 0.55));
      z-index: 2;
    }

    .btn-google {
      background: rgba(255, 255, 255, 0.04);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.12);
      color: white;
      padding: 18px 36px;
      border-radius: 100px;
      font-weight: 600;
      font-size: 16px;
      letter-spacing: 0.2px;
      cursor: pointer;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.22);
      position: relative;
      overflow: hidden;
    }

    .btn-google:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(20, 184, 166, 0.45);
      transform: translateY(-2px);
      box-shadow: 0 12px 40px rgba(20, 184, 166, 0.16);
    }

    .btn-google:active {
      transform: translateY(1px);
    }

    .btn-google::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(120deg, transparent 20%, rgba(255,255,255,0.08) 50%, transparent 80%);
      transform: translateX(-120%);
      transition: transform 0.8s ease;
    }

    .btn-google:hover::before {
      transform: translateX(120%);
    }

    .debug-note {
      position: absolute;
      left: 16px;
      bottom: 14px;
      z-index: 20;
      font-size: 12px;
      color: rgba(255,255,255,0.38);
      letter-spacing: 0.02em;
      pointer-events: none;
      display: none;
    }

    @media (max-width: 640px) {
      .scene::before {
        background-size: 54px 54px;
      }

      .logo-wrapper {
        width: 230px;
        height: 230px;
      }

      main {
        gap: 48px;
        padding: 24px;
      }
    }
  </style>
</head>
<body>
  <div class="scene">
    <svg
      class="territory-overlay"
      id="territoryOverlay"
      viewBox="0 0 1000 1000"
      preserveAspectRatio="xMidYMid meet"
    ></svg>
  </div>

  <div class="glow-orb"></div>

  <main>
    <div class="logo-wrapper">
      <img src="assets/logo.png" alt="Territory Assistant">
    </div>

    <button class="btn-google" onclick="window.appConfig.signInWithGoogle()">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      Secure Sign In
    </button>
  </main>

  <div class="debug-note" id="debugNote"></div>

  <script>
    async function loadTerritoryPolygons() {
      const svg = document.getElementById('territoryOverlay');
      const debugNote = document.getElementById('debugNote');
      if (!svg) return;

      try {
        const response = await fetch('./assets/territory-backup-20260307-155828.json');
        if (!response.ok) {
          throw new Error(`Unable to load territory polygons: ${response.status}`);
        }

        const data = await response.json();
        const territories = Array.isArray(data.territories) ? data.territories : [];
        if (!territories.length) {
          throw new Error('No territories found in JSON.');
        }

        const allPoints = territories.flatMap(territory =>
          Array.isArray(territory.polygon) ? territory.polygon : []
        );

        if (!allPoints.length) {
          throw new Error('No polygon points found.');
        }

        const lats = allPoints.map(([lat]) => lat);
        const lngs = allPoints.map(([, lng]) => lng);

        const minLat = Math.min(...lats);
        const maxLat = Math.max(...lats);
        const minLng = Math.min(...lngs);
        const maxLng = Math.max(...lngs);

        const viewBoxSize = 1000;
        const padding = 92;
        const drawable = viewBoxSize - padding * 2;

        function project(lat, lng) {
          const x = padding + ((lng - minLng) / (maxLng - minLng || 1)) * drawable;
          const y = viewBoxSize - (padding + ((lat - minLat) / (maxLat - minLat || 1)) * drawable);
          return [x, y];
        }

        svg.innerHTML = '';

        territories.forEach((territory, index) => {
          if (!Array.isArray(territory.polygon) || territory.polygon.length < 3) return;

          const points = territory.polygon.map(([lat, lng]) => project(lat, lng));
          const d = points
            .map((point, i) => `${i === 0 ? 'M' : 'L'} ${point[0].toFixed(2)} ${point[1].toFixed(2)}`)
            .join(' ') + ' Z';

          const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
          path.setAttribute('d', d);
          path.setAttribute('fill', 'var(--territory-fill)');
          path.setAttribute('stroke', 'var(--territory-stroke)');
          path.setAttribute('stroke-width', '1.6');
          path.setAttribute('vector-effect', 'non-scaling-stroke');
          path.style.filter = 'drop-shadow(0 0 8px var(--territory-shadow))';
          path.style.opacity = '0';
          path.style.animation = `territoryFade 9s ease-in-out ${(index * 0.09).toFixed(2)}s infinite`;

          svg.appendChild(path);
        });

        console.log(`Loaded ${territories.length} territories`);
        if (debugNote) {
          debugNote.textContent = `Loaded ${territories.length} territories`;
        }
      } catch (error) {
        console.error('Territory overlay not loaded:', error);
        if (debugNote) {
          debugNote.style.display = 'block';
          debugNote.textContent = `Territory overlay not loaded: ${error.message}`;
        }
      }
    }

    window.onload = async () => {
      await loadTerritoryPolygons();

      if (window.appConfig && window.appConfig.supabase) {
        const { data: { session } } = await window.appConfig.supabase.auth.getSession();
        if (session) {
          window.location.href = 'Territory Management.html';
        }
      }
    };
  </script>
</body>
</html>

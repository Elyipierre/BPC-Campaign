<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BPC Campaign | Secure Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            background: radial-gradient(circle at top left, #1e293b, #0f172a);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .animate-pulse-slow {
            animation: pulse 8s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes pulse { 0%, 100% { opacity: 0.1; } 50% { opacity: 0.3; } }
    </style>
</head>
<body>
    <div class="absolute top-0 left-0 w-96 h-96 bg-teal-500 rounded-full mix-blend-multiply filter blur-3xl opacity-10 animate-pulse-slow"></div>
    <div class="absolute bottom-0 right-0 w-96 h-96 bg-blue-600 rounded-full mix-blend-multiply filter blur-3xl opacity-10 animate-pulse-slow"></div>

    <div class="glass-card p-10 rounded-[2rem] w-full max-w-md text-center relative z-10">
        <div class="mb-8">
            <div class="w-20 h-20 bg-gradient-to-tr from-teal-400 to-blue-500 rounded-2xl mx-auto flex items-center justify-center shadow-lg mb-4">
                <span class="text-white text-3xl font-bold">BPC</span>
            </div>
            <h1 class="text-3xl font-bold text-white tracking-tight">Campaign Pro</h1>
            <p class="text-slate-400 mt-2">Territory Management Redefined</p>
        </div>

        <button onclick="window.appConfig.signInWithGoogle()" 
                class="w-full bg-white hover:bg-slate-100 text-slate-900 font-semibold py-4 px-6 rounded-xl flex items-center justify-center transition-all duration-300 transform hover:scale-[1.02] active:scale-[0.98] shadow-xl">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" class="w-5 h-5 mr-3">
            Continue with Google
        </button>

        <div class="mt-8 pt-8 border-t border-white/10">
            <p class="text-xs text-slate-500 uppercase tracking-widest">Authorized Access Only</p>
        </div>
    </div>

    <script src="assets/app-config.js"></script>
    <script>
        // Check if already logged in
        window.onload = async () => {
            const { data: { session } } = await window.appConfig.supabase.auth.getSession();
            if (session) window.location.href = 'Territory%20Management.html';
        };
    </script>
</body>
</html>

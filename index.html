<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Territory Assistant - Secure Access</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/app-config.js"></script>

  <style>
    * { box-sizing: border-box; }

    :root {
      --grid-line: rgba(148, 163, 184, 0.03);
      --territory-stroke: rgba(153, 246, 228, 0.16);
      --territory-fill: rgba(20, 184, 166, 0.02);
      --territory-shadow: rgba(20, 184, 166, 0.035);
      --street-text: rgba(220, 252, 231, 0.48);
      --street-bg: rgba(10, 20, 40, 0.28);
      --street-border: rgba(255, 255, 255, 0.06);
    }

    html, body {
      width: 100%;
      height: 100%;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      color: white;
      font-family: 'Inter', sans-serif;
      background:
        radial-gradient(circle at 50% 42%, rgba(20, 184, 166, 0.12) 0%, rgba(20, 184, 166, 0.055) 16%, rgba(15, 23, 42, 0) 42%),
        radial-gradient(circle at 50% 50%, rgba(14, 165, 233, 0.04) 0%, transparent 46%),
        linear-gradient(180deg, #071332 0%, #081536 32%, #08142f 68%, #06112a 100%);
      isolation: isolate;
    }

    @keyframes float {
      0% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
      100% { transform: translateY(0); }
    }

    @keyframes glowPulse {
      0%, 100% {
        opacity: 0.58;
        transform: translate(-50%, -50%) scale(1);
      }
      50% {
        opacity: 0.82;
        transform: translate(-50%, -50%) scale(1.035);
      }
    }

    @keyframes overlayFadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes overlayFadeOut {
      from { opacity: 1; }
      to { opacity: 0; }
    }

    .scene {
      position: absolute;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      overflow: hidden;
    }

    .scene::before,
    .scene::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .scene::before {
      background-image:
        linear-gradient(var(--grid-line) 1px, transparent 1px),
        linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
      background-size: 86px 86px;
      opacity: 0.14;
      mask-image: radial-gradient(circle at center, black 16%, rgba(0,0,0,0.64) 44%, transparent 88%);
      -webkit-mask-image: radial-gradient(circle at center, black 16%, rgba(0,0,0,0.64) 44%, transparent 88%);
      transform: perspective(980px) rotateX(68deg) scale(1.6);
      transform-origin: center center;
    }

    .scene::after {
      background:
        radial-gradient(circle at center, rgba(20,184,166,0.06) 0%, rgba(20,184,166,0.025) 22%, transparent 58%);
      filter: blur(40px);
      opacity: 0.62;
    }

    .territory-overlay {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 2;
      pointer-events: none;
      overflow: hidden;
    }

    .territory-layer {
      opacity: 0;
      transition: opacity 2s ease;
    }

    .territory-layer.visible {
      opacity: 1;
    }

    .territory-path {
      fill: var(--territory-fill);
      stroke: var(--territory-stroke);
      stroke-width: 1.4;
      vector-effect: non-scaling-stroke;
      filter: drop-shadow(0 0 5px var(--territory-shadow));
    }

    .street-label {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      fill: var(--street-text);
      paint-order: stroke;
      stroke: rgba(5, 10, 20, 0.35);
      stroke-width: 3px;
      stroke-linejoin: round;
    }

    .street-chip {
      fill: var(--street-bg);
      stroke: var(--street-border);
      stroke-width: 1;
      rx: 999;
      ry: 999;
    }

    .glow-orb {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 440px;
      height: 440px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(20,184,166,0.16) 0%, rgba(20,184,166,0.06) 34%, rgba(20,184,166,0) 72%);
      filter: blur(86px);
      z-index: 3;
      pointer-events: none;
      animation: glowPulse 9s ease-in-out infinite;
    }

    main {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 70px;
      padding: 40px 32px;
    }

    .logo-wrapper {
      width: 280px;
      height: 280px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      animation: float 6s ease-in-out infinite;
    }

    .logo-wrapper img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      filter: drop-shadow(0 24px 32px rgba(0, 0, 0, 0.55));
      z-index: 2;
    }

    .btn-google {
      background: rgba(255, 255, 255, 0.04);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.12);
      color: white;
      padding: 18px 36px;
      border-radius: 100px;
      font-weight: 600;
      font-size: 16px;
      letter-spacing: 0.2px;
      cursor: pointer;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.22);
      position: relative;
      overflow: hidden;
    }

    .btn-google:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(20, 184, 166, 0.45);
      transform: translateY(-2px);
      box-shadow: 0 12px 40px rgba(20, 184, 166, 0.16);
    }

    .btn-google:active {
      transform: translateY(1px);
    }

    .btn-google::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(120deg, transparent 20%, rgba(255,255,255,0.08) 50%, transparent 80%);
      transform: translateX(-120%);
      transition: transform 0.8s ease;
    }

    .btn-google:hover::before {
      transform: translateX(120%);
    }

    .debug-note {
      position: absolute;
      left: 16px;
      bottom: 14px;
      z-index: 20;
      font-size: 12px;
      color: rgba(255,255,255,0.42);
      letter-spacing: 0.02em;
      pointer-events: none;
      display: none;
    }

    @media (max-width: 900px) {
      .scene::before {
        background-size: 64px 64px;
      }
    }

    @media (max-width: 640px) {
      .scene::before {
        background-size: 54px 54px;
      }

      .logo-wrapper {
        width: 230px;
        height: 230px;
      }

      main {
        gap: 48px;
        padding: 24px;
      }

      .street-label {
        font-size: 12px;
      }
    }
  </style>
</head>
<body>
  <div class="scene">
    <svg
      class="territory-overlay"
      id="territoryOverlay"
      viewBox="0 0 1600 900"
      preserveAspectRatio="xMidYMid slice"
    ></svg>
  </div>

  <div class="glow-orb"></div>

  <main>
    <div class="logo-wrapper">
      <img src="assets/logo.png" alt="Territory Assistant">
    </div>

    <button class="btn-google" onclick="window.appConfig.signInWithGoogle()">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      Secure Sign In
    </button>
  </main>

  <div class="debug-note" id="debugNote"></div>

  <script>
    const territoryStreets = {
      /*
        Replace these with your real territory IDs or names from your JSON.
        Example formats:

        "1": ["Rockaway Blvd", "130th St", "Sutphin Blvd", "145th Ave"],
        "14": ["Guy R Brewer Blvd", "Linden Blvd", "147th Ave"],
        "Territory 08": ["Baisley Blvd", "150th St", "N Conduit Ave"]
      */
    };

    function createSvgEl(tag) {
      return document.createElementNS('http://www.w3.org/2000/svg', tag);
    }

    function randomBetween(min, max) {
      return Math.random() * (max - min) + min;
    }

    function clamp(value, min, max) {
      return Math.min(max, Math.max(min, value));
    }

    function getTerritoryKey(territory, index) {
      return String(
        territory?.id ??
        territory?.name ??
        territory?.number ??
        territory?.territory ??
        index + 1
      );
    }

    function getStreetListForTerritory(territory, index) {
      const key = getTerritoryKey(territory, index);
      return territoryStreets[key] || [];
    }

    function computeCentroid(points) {
      const count = points.length || 1;
      const sum = points.reduce((acc, [x, y]) => {
        acc.x += x;
        acc.y += y;
        return acc;
      }, { x: 0, y: 0 });

      return [sum.x / count, sum.y / count];
    }

    function distributeStreetAnchors(cx, cy, count, maxWidth, maxHeight) {
      const anchors = [];
      const radiusX = Math.min(120, maxWidth * 0.2);
      const radiusY = Math.min(90, maxHeight * 0.16);

      for (let i = 0; i < count; i++) {
        const angle = (Math.PI * 2 * i) / Math.max(count, 1) - Math.PI / 2;
        const x = cx + Math.cos(angle) * radiusX;
        const y = cy + Math.sin(angle) * radiusY;
        anchors.push([
          clamp(x, 90, 1510),
          clamp(y, 80, 840)
        ]);
      }

      return anchors;
    }

    function pointInProtectedZone(x, y) {
      const protectedZones = [
        { x: 560, y: 120, w: 500, h: 460 },
        { x: 610, y: 520, w: 380, h: 160 }
      ];

      return protectedZones.some(zone =>
        x >= zone.x && x <= zone.x + zone.w &&
        y >= zone.y && y <= zone.y + zone.h
      );
    }

    function chooseDisplayRegion() {
      const regions = [
        { xMin: 60,  xMax: 500,  yMin: 70,  yMax: 360 },
        { xMin: 1060, xMax: 1500, yMin: 80,  yMax: 360 },
        { xMin: 70,  xMax: 500,  yMin: 470, yMax: 820 },
        { xMin: 1060, xMax: 1500, yMin: 470, yMax: 820 },
        { xMin: 260, xMax: 520,  yMin: 260, yMax: 700 },
        { xMin: 1080, xMax: 1360, yMin: 220, yMax: 720 }
      ];

      return regions[Math.floor(Math.random() * regions.length)];
    }

    function buildStreetLabel(svgGroup, textValue, x, y) {
      const text = createSvgEl('text');
      text.setAttribute('class', 'street-label');
      text.setAttribute('x', x);
      text.setAttribute('y', y);
      text.setAttribute('text-anchor', 'middle');
      text.setAttribute('dominant-baseline', 'middle');
      text.textContent = textValue;

      svgGroup.appendChild(text);
      const bbox = text.getBBox();

      const rect = createSvgEl('rect');
      rect.setAttribute('class', 'street-chip');
      rect.setAttribute('x', bbox.x - 10);
      rect.setAttribute('y', bbox.y - 6);
      rect.setAttribute('width', bbox.width + 20);
      rect.setAttribute('height', bbox.height + 12);
      rect.setAttribute('rx', 999);
      rect.setAttribute('ry', 999);

      svgGroup.insertBefore(rect, text);
    }

    async function loadTerritoryData() {
      const response = await fetch('./assets/territory-backup-20260307-155828.json');
      if (!response.ok) {
        throw new Error(`Unable to load territory polygons: ${response.status}`);
      }

      const data = await response.json();
      const territories = Array.isArray(data.territories) ? data.territories : [];
      if (!territories.length) {
        throw new Error('No territories found in JSON.');
      }

      const allPoints = territories.flatMap(territory =>
        Array.isArray(territory.polygon) ? territory.polygon : []
      );

      if (!allPoints.length) {
        throw new Error('No polygon points found.');
      }

      const lats = allPoints.map(([lat]) => lat);
      const lngs = allPoints.map(([, lng]) => lng);

      const minLat = Math.min(...lats);
      const maxLat = Math.max(...lats);
      const minLng = Math.min(...lngs);
      const maxLng = Math.max(...lngs);

      return territories
        .map((territory, index) => {
          if (!Array.isArray(territory.polygon) || territory.polygon.length < 3) return null;

          const normalized = territory.polygon.map(([lat, lng]) => {
            const x = (lng - minLng) / (maxLng - minLng || 1);
            const y = 1 - ((lat - minLat) / (maxLat - minLat || 1));
            return [x, y];
          });

          return {
            raw: territory,
            index,
            key: getTerritoryKey(territory, index),
            streets: getStreetListForTerritory(territory, index),
            normalized
          };
        })
        .filter(Boolean);
    }

    function createTerritoryScene(svg, territoryEntry) {
      const layer = createSvgEl('g');
      layer.setAttribute('class', 'territory-layer');

      const region = chooseDisplayRegion();
      const baseWidth = randomBetween(220, 360);
      const baseHeight = randomBetween(260, 420);

      const offsetX = randomBetween(region.xMin, region.xMax - baseWidth);
      const offsetY = randomBetween(region.yMin, region.yMax - baseHeight);

      const projectedPoints = territoryEntry.normalized.map(([ux, uy]) => [
        offsetX + ux * baseWidth,
        offsetY + uy * baseHeight
      ]);

      const centroid = computeCentroid(projectedPoints);

      const pathData = projectedPoints
        .map((point, i) => `${i === 0 ? 'M' : 'L'} ${point[0].toFixed(2)} ${point[1].toFixed(2)}`)
        .join(' ') + ' Z';

      const path = createSvgEl('path');
      path.setAttribute('class', 'territory-path');
      path.setAttribute('d', pathData);

      layer.appendChild(path);

      const streets = territoryEntry.streets.slice(0, 4);
      if (streets.length) {
        const anchors = distributeStreetAnchors(
          centroid[0],
          centroid[1],
          streets.length,
          baseWidth,
          baseHeight
        );

        streets.forEach((street, i) => {
          const [x, y] = anchors[i];
          if (!pointInProtectedZone(x, y)) {
            buildStreetLabel(layer, street, x, y);
          }
        });
      }

      svg.appendChild(layer);

      requestAnimationFrame(() => {
        layer.classList.add('visible');
      });

      return layer;
    }

    async function startTerritoryRotation() {
      const svg = document.getElementById('territoryOverlay');
      const debugNote = document.getElementById('debugNote');
      if (!svg) return;

      try {
        const territoryEntries = await loadTerritoryData();
        if (!territoryEntries.length) {
          throw new Error('No usable territory polygons found.');
        }

        if (debugNote) {
          debugNote.style.display = 'none';
        }

        let currentLayer = null;
        let lastIndex = -1;

        function nextIndex() {
          if (territoryEntries.length === 1) return 0;

          let idx = Math.floor(Math.random() * territoryEntries.length);
          while (idx === lastIndex) {
            idx = Math.floor(Math.random() * territoryEntries.length);
          }
          lastIndex = idx;
          return idx;
        }

        async function cycleTerritory() {
          if (currentLayer) {
            currentLayer.classList.remove('visible');
            await new Promise(resolve => setTimeout(resolve, 1800));
            currentLayer.remove();
            currentLayer = null;
          }

          const territory = territoryEntries[nextIndex()];
          currentLayer = createTerritoryScene(svg, territory);

          const hasStreets = territory.streets.length > 0;
          const visibleTime = hasStreets ? 5200 : 4200;

          setTimeout(cycleTerritory, visibleTime);
        }

        cycleTerritory();
      } catch (error) {
        console.error('Territory overlay not loaded:', error);
        if (debugNote) {
          debugNote.style.display = 'block';
          debugNote.textContent = `Territory overlay not loaded: ${error.message}`;
        }
      }
    }

    window.onload = async () => {
      await startTerritoryRotation();

      if (window.appConfig && window.appConfig.supabase) {
        const { data: { session } } = await window.appConfig.supabase.auth.getSession();
        if (session) {
          window.location.href = 'Territory Management.html';
        }
      }
    };
  </script>
</body>
</html>

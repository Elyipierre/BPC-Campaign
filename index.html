<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Territory Assistant - Secure Access</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/app-config.js"></script>

  <style>
    * { box-sizing: border-box; }

    :root {
      --grid-line: rgba(148, 163, 184, 0.035);
      --territory-stroke: rgba(153, 246, 228, 0.105);
      --territory-fill: rgba(20, 184, 166, 0.010);
      --territory-shadow: rgba(20, 184, 166, 0.022);
    }

    html, body {
      width: 100%;
      height: 100%;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      color: white;
      font-family: 'Inter', sans-serif;
      background:
        radial-gradient(circle at 50% 42%, rgba(20, 184, 166, 0.13) 0%, rgba(20, 184, 166, 0.06) 16%, rgba(15, 23, 42, 0) 42%),
        radial-gradient(circle at 50% 50%, rgba(14, 165, 233, 0.045) 0%, transparent 46%),
        linear-gradient(180deg, #071332 0%, #081536 32%, #08142f 68%, #06112a 100%);
      isolation: isolate;
    }

    @keyframes float {
      0% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
      100% { transform: translateY(0); }
    }

    @keyframes glowPulse {
      0%, 100% {
        opacity: 0.62;
        transform: translate(-50%, -50%) scale(1);
      }
      50% {
        opacity: 0.88;
        transform: translate(-50%, -50%) scale(1.04);
      }
    }

    @keyframes mapDriftA {
      0%, 100% { transform: translate3d(0, 0, 0) rotate(var(--rot)) scale(var(--scale)); }
      50% { transform: translate3d(10px, -8px, 0) rotate(calc(var(--rot) + 1deg)) scale(calc(var(--scale) * 1.015)); }
    }

    @keyframes mapDriftB {
      0%, 100% { transform: translate3d(0, 0, 0) rotate(var(--rot)) scale(var(--scale)); }
      50% { transform: translate3d(-12px, 10px, 0) rotate(calc(var(--rot) - 1deg)) scale(calc(var(--scale) * 1.02)); }
    }

    @keyframes mapDriftC {
      0%, 100% { transform: translate3d(0, 0, 0) rotate(var(--rot)) scale(var(--scale)); }
      50% { transform: translate3d(8px, 12px, 0) rotate(calc(var(--rot) + 0.8deg)) scale(calc(var(--scale) * 1.012)); }
    }

    @keyframes mapFade {
      0%, 100% { opacity: 0.018; }
      35% { opacity: 0.05; }
      50% { opacity: 0.075; }
      75% { opacity: 0.04; }
    }

    .scene {
      position: absolute;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      overflow: hidden;
    }

    .scene::before,
    .scene::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .scene::before {
      background-image:
        linear-gradient(var(--grid-line) 1px, transparent 1px),
        linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
      background-size: 84px 84px;
      opacity: 0.16;
      mask-image: radial-gradient(circle at center, black 18%, rgba(0,0,0,0.68) 44%, transparent 88%);
      -webkit-mask-image: radial-gradient(circle at center, black 18%, rgba(0,0,0,0.68) 44%, transparent 88%);
      transform: perspective(980px) rotateX(68deg) scale(1.58);
      transform-origin: center center;
    }

    .scene::after {
      background:
        radial-gradient(circle at center, rgba(20,184,166,0.07) 0%, rgba(20,184,166,0.03) 22%, transparent 56%);
      filter: blur(38px);
      opacity: 0.68;
    }

    .territory-overlay {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 2;
      pointer-events: none;
      overflow: visible;
    }

    .map-fragment {
      transform-box: fill-box;
      transform-origin: center;
      opacity: 0.04;
    }

    .map-fragment.drift-a {
      animation:
        mapFade 18s ease-in-out infinite,
        mapDriftA 26s ease-in-out infinite;
    }

    .map-fragment.drift-b {
      animation:
        mapFade 20s ease-in-out infinite 1.3s,
        mapDriftB 30s ease-in-out infinite;
    }

    .map-fragment.drift-c {
      animation:
        mapFade 22s ease-in-out infinite 2.1s,
        mapDriftC 34s ease-in-out infinite;
    }

    .territory-path {
      fill: var(--territory-fill);
      stroke: var(--territory-stroke);
      stroke-width: 1.1;
      vector-effect: non-scaling-stroke;
      filter: drop-shadow(0 0 4px var(--territory-shadow));
    }

    .glow-orb {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 440px;
      height: 440px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(20,184,166,0.18) 0%, rgba(20,184,166,0.07) 34%, rgba(20,184,166,0) 72%);
      filter: blur(86px);
      z-index: 3;
      pointer-events: none;
      animation: glowPulse 9s ease-in-out infinite;
    }

    main {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 70px;
      padding: 40px 32px;
    }

    .logo-wrapper {
      width: 280px;
      height: 280px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      animation: float 6s ease-in-out infinite;
    }

    .logo-wrapper img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      filter: drop-shadow(0 24px 32px rgba(0, 0, 0, 0.55));
      z-index: 2;
    }

    .btn-google {
      background: rgba(255, 255, 255, 0.04);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.12);
      color: white;
      padding: 18px 36px;
      border-radius: 100px;
      font-weight: 600;
      font-size: 16px;
      letter-spacing: 0.2px;
      cursor: pointer;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.22);
      position: relative;
      overflow: hidden;
    }

    .btn-google:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(20, 184, 166, 0.45);
      transform: translateY(-2px);
      box-shadow: 0 12px 40px rgba(20, 184, 166, 0.16);
    }

    .btn-google:active {
      transform: translateY(1px);
    }

    .btn-google::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(120deg, transparent 20%, rgba(255,255,255,0.08) 50%, transparent 80%);
      transform: translateX(-120%);
      transition: transform 0.8s ease;
    }

    .btn-google:hover::before {
      transform: translateX(120%);
    }

    .debug-note {
      position: absolute;
      left: 16px;
      bottom: 14px;
      z-index: 20;
      font-size: 12px;
      color: rgba(255,255,255,0.42);
      letter-spacing: 0.02em;
      pointer-events: none;
      display: none;
    }

    @media (max-width: 900px) {
      .scene::before {
        background-size: 64px 64px;
      }
    }

    @media (max-width: 640px) {
      .scene::before {
        background-size: 54px 54px;
      }

      .logo-wrapper {
        width: 230px;
        height: 230px;
      }

      main {
        gap: 48px;
        padding: 24px;
      }
    }
  </style>
</head>
<body>
  <div class="scene">
    <svg
      class="territory-overlay"
      id="territoryOverlay"
      viewBox="0 0 1600 900"
      preserveAspectRatio="xMidYMid slice"
    ></svg>
  </div>

  <div class="glow-orb"></div>

  <main>
    <div class="logo-wrapper">
      <img src="assets/logo.png" alt="Territory Assistant">
    </div>

    <button class="btn-google" onclick="window.appConfig.signInWithGoogle()">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      Secure Sign In
    </button>
  </main>

  <div class="debug-note" id="debugNote"></div>

  <script>
    function createSvgEl(tag) {
      return document.createElementNS('http://www.w3.org/2000/svg', tag);
    }

    function seededRandom(seed) {
      const x = Math.sin(seed) * 10000;
      return x - Math.floor(x);
    }

    function intersectsProtectedZone(x, y, w, h) {
      const protectedZones = [
        { x: 520, y: 120, w: 560, h: 520 },
        { x: 610, y: 520, w: 380, h: 180 }
      ];

      return protectedZones.some(zone => {
        return !(
          x + w < zone.x ||
          x > zone.x + zone.w ||
          y + h < zone.y ||
          y > zone.y + zone.h
        );
      });
    }

    async function loadTerritoryPolygons() {
      const svg = document.getElementById('territoryOverlay');
      const debugNote = document.getElementById('debugNote');
      if (!svg) return;

      try {
        const jsonPath = './assets/territory-backup-20260307-155828.json';
        const response = await fetch(jsonPath);

        if (!response.ok) {
          throw new Error(`Unable to load territory polygons: ${response.status}`);
        }

        const data = await response.json();
        const territories = Array.isArray(data.territories) ? data.territories : [];

        if (!territories.length) {
          throw new Error('No territories found in JSON.');
        }

        const allPoints = territories.flatMap(territory =>
          Array.isArray(territory.polygon) ? territory.polygon : []
        );

        if (!allPoints.length) {
          throw new Error('No polygon points found.');
        }

        const lats = allPoints.map(([lat]) => lat);
        const lngs = allPoints.map(([, lng]) => lng);

        const minLat = Math.min(...lats);
        const maxLat = Math.max(...lats);
        const minLng = Math.min(...lngs);
        const maxLng = Math.max(...lngs);

        function projectToUnit(lat, lng) {
          const x = (lng - minLng) / (maxLng - minLng || 1);
          const y = 1 - ((lat - minLat) / (maxLat - minLat || 1));
          return [x, y];
        }

        function buildTerritoryFragment(width, height, offsetX, offsetY) {
          const fragment = document.createDocumentFragment();

          territories.forEach((territory) => {
            if (!Array.isArray(territory.polygon) || territory.polygon.length < 3) return;

            const points = territory.polygon.map(([lat, lng]) => {
              const [ux, uy] = projectToUnit(lat, lng);
              return [
                offsetX + (ux * width),
                offsetY + (uy * height)
              ];
            });

            const d = points
              .map((point, i) => `${i === 0 ? 'M' : 'L'} ${point[0].toFixed(2)} ${point[1].toFixed(2)}`)
              .join(' ') + ' Z';

            const path = createSvgEl('path');
            path.setAttribute('d', d);
            path.setAttribute('class', 'territory-path');
            fragment.appendChild(path);
          });

          return fragment;
        }

        svg.innerHTML = '';

        const viewWidth = 1600;
        const viewHeight = 900;
        const placements = [];
        const fragmentCount = 10;

        for (let i = 0; i < fragmentCount; i++) {
          const width = 150 + seededRandom(i + 1) * 220;
          const height = width * (1.08 + seededRandom(i + 20) * 0.35);
          let x = seededRandom(i + 100) * (viewWidth - width);
          let y = seededRandom(i + 200) * (viewHeight - height);

          let tries = 0;
          while (intersectsProtectedZone(x, y, width, height) && tries < 40) {
            x = seededRandom(i + 100 + tries * 3.1) * (viewWidth - width);
            y = seededRandom(i + 200 + tries * 2.7) * (viewHeight - height);
            tries++;
          }

          placements.push({
            x,
            y,
            width,
            height,
            rotation: -18 + seededRandom(i + 300) * 36,
            scale: 0.8 + seededRandom(i + 400) * 0.55,
            drift: ['drift-a', 'drift-b', 'drift-c'][i % 3]
          });
        }

        placements.forEach((placement, index) => {
          const group = createSvgEl('g');
          group.setAttribute('class', `map-fragment ${placement.drift}`);
          group.style.setProperty('--rot', `${placement.rotation.toFixed(2)}deg`);
          group.style.setProperty('--scale', placement.scale.toFixed(3));
          group.style.animationDelay = `${(index * 1.2).toFixed(2)}s, ${(index * 0.6).toFixed(2)}s`;

          group.appendChild(
            buildTerritoryFragment(
              placement.width,
              placement.height,
              placement.x,
              placement.y
            )
          );

          svg.appendChild(group);
        });

        if (debugNote) {
          debugNote.style.display = 'none';
        }
      } catch (error) {
        console.error('Territory overlay not loaded:', error);
        if (debugNote) {
          debugNote.style.display = 'block';
          debugNote.textContent = `Territory overlay not loaded: ${error.message}`;
        }
      }
    }

    window.onload = async () => {
      await loadTerritoryPolygons();

      if (window.appConfig && window.appConfig.supabase) {
        const { data: { session } } = await window.appConfig.supabase.auth.getSession();
        if (session) {
          window.location.href = 'Territory Management.html';
        }
      }
    };
  </script>
</body>
</html>

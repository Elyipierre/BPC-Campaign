<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BPC Campaign | Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #0f172a; color: white; min-height: 100vh; }
        .glass-panel { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        body.campaign-active { border-top: 4px solid #14b8a6; }
    </style>
</head>
<body class="antialiased">
    <nav class="glass-panel sticky top-0 z-50 px-8 py-4 flex items-center justify-between border-b border-white/5">
        <div class="flex items-center space-x-4">
            <img src="assets/logo.png" alt="Logo" class="w-10 h-10">
            <h1 class="text-xl font-bold">BPC Campaign</h1>
        </div>
        <div class="flex items-center space-x-6">
            <div class="flex items-center space-x-3 bg-black/20 p-2 px-4 rounded-2xl">
                <span class="text-[10px] font-black text-slate-500 uppercase">Standard</span>
                <button id="campaignToggle" onclick="window.appConfig.toggleCampaignMode(localStorage.getItem('campaign_mode') !== 'true')" 
                        class="relative inline-flex h-6 w-11 items-center rounded-full bg-slate-700 transition-all">
                    <span id="toggleKnob" class="inline-block h-4 w-4 transform rounded-full bg-white transition duration-300 translate-x-1"></span>
                </button>
                <span class="text-[10px] font-black text-teal-400 uppercase">Campaign</span>
            </div>
            <button onclick="window.appConfig.signOut()" class="text-xs font-bold text-slate-400 hover:text-white">Sign Out</button>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-12">
        <h2 class="text-4xl font-black mb-8">Territory Overview</h2>
        <div id="territory-container" class="grid grid-cols-1 md:grid-cols-3 gap-8">
            </div>
    </main>

    <script src="assets/app-config.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const { data: { session } } = await window.appConfig.supabase.auth.getSession();
            if (!session) { window.location.href = 'index.html'; return; }
            loadData();
        });

        async function loadData() {
            const { data } = await window.appConfig.supabase.from('territories').select('*');
            document.getElementById('territory-container').innerHTML = data.map(t => `
                <div class="glass-panel p-6 rounded-3xl">
                    <h4 class="text-xl font-bold mb-2">${t.name}</h4>
                    <p class="text-slate-400 text-sm mb-6">${t.description || ''}</p>
                    <button class="w-full bg-teal-500 py-3 rounded-2xl font-bold">View Territory</button>
                </div>
            `).join('');
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BPC Campaign | Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #0f172a; color: white; min-height: 100vh; transition: 0.3s; }
        .glass-panel { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        body.campaign-active { box-shadow: inset 0 0 80px rgba(20, 184, 166, 0.15); border-top: 4px solid #14b8a6; }
    </style>
</head>
<body class="antialiased">
    <nav class="glass-panel sticky top-0 z-50 px-6 py-4 flex items-center justify-between">
        <div class="flex items-center space-x-3">
            <img src="assets/logo.png" alt="Logo" class="w-8 h-8">
            <span class="font-bold text-lg tracking-tight">BPC Campaign</span>
        </div>
        <div class="flex items-center space-x-6">
            <div class="flex items-center space-x-3 bg-black/30 p-1.5 px-4 rounded-full border border-white/5">
                <span id="campaign-label" class="text-[10px] font-black uppercase text-slate-500">Standard</span>
                <button id="campaignToggle" onclick="window.appConfig.toggleCampaignMode(localStorage.getItem('campaign_mode') !== 'true')" class="relative inline-flex h-5 w-10 items-center rounded-full bg-slate-700 transition-all">
                    <span id="toggleKnob" class="inline-block h-3.5 w-3.5 transform rounded-full bg-white transition-all translate-x-1"></span>
                </button>
                <span id="campaign-active-label" class="text-[10px] font-black uppercase text-teal-400 opacity-50">Campaign</span>
            </div>
            <button onclick="window.appConfig.signOut()" class="text-xs font-bold text-slate-400 hover:text-white transition-colors">Sign Out</button>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto p-10">
        <header class="mb-12">
            <h2 class="text-4xl font-black mb-2">Territory Overview</h2>
            <p id="user-welcome" class="text-slate-400 text-sm">Validating session...</p>
        </header>

        <div id="territory-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            </div>
    </main>

    <script src="assets/app-config.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const { data: { session } } = await window.appConfig.supabase.auth.getSession();
            if (!session) {
                window.location.href = 'index.html';
            } else {
                document.getElementById('user-welcome').innerText = `Welcome back, ${session.user.user_metadata.full_name || session.user.email}`;
                fetchData();
            }
        });

        async function fetchData() {
            const { data, error } = await window.appConfig.supabase.from('territories').select('*');
            if (data) {
                const container = document.getElementById('territory-grid');
                container.innerHTML = data.map(t => `
                    <div class="glass-panel p-6 rounded-[2rem] hover:border-teal-500/40 transition-all group">
                        <div class="text-[10px] font-black text-slate-500 uppercase mb-2 tracking-widest">Area #${t.number || '00'}</div>
                        <h3 class="text-xl font-bold mb-4 group-hover:text-teal-400 transition-colors">${t.name}</h3>
                        <p class="text-slate-400 text-xs mb-6 line-clamp-2">${t.description || 'No description available.'}</p>
                        <button class="w-full bg-white/5 hover:bg-teal-500 py-3 rounded-2xl text-sm font-bold transition-all">View Details</button>
                    </div>
                `).join('');
            }
        }
    </script>
</body>
</html>
